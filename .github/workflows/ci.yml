name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Test pipelines actions - worker
        run: npm run test:worker -- --coverage

      - name: Test health endpoint - server
        run: npm run test:server -- --coverage
  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check Formaing
        run: npm run format:check

      - name: Install dependencies
        run: npm ci

      - name: Check linting
        run: npm run lint -- --max-warnings=0
